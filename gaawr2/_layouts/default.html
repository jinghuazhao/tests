<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <style>
      body {
        max-width: 900px;
        margin: 40px auto;
        font-family: Arial, sans-serif;
        line-height: 1.6;
        padding: 0 20px;
      }
      a {
        color: #0366d6;
      }
      code {
        background: #f4f4f4;
        padding: 2px 4px;
        border-radius: 4px;
      }
      pre {
        background: #f6f8fa;
        padding: 12px;
        overflow-x: auto;
      }
      .mermaid {
        text-align: center;
      }
    </style>
  </head>
  <body>
    {{ content }}
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function () {
      mermaid.initialize({
        startOnLoad: false,
        theme: "default"
      });
  mermaid.init(undefined, document.querySelectorAll(".mermaid"));
});
</script>
  </body>
</html>
