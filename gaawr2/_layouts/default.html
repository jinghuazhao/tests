<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <!-- Optional: simple styling -->
  <style>
    body {
      max-width: 900px;
      margin: 40px auto;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      padding: 0 20px;
    }
    code {
      background: #f4f4f4;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- THIS IS CRITICAL: Jekyll injects Markdown here -->
  {{ content }}
  <!-- Mermaid loader -->
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    document.addEventListener("DOMContentLoaded", () => {
      mermaid.initialize({
        startOnLoad: true,
        theme: "default"
      });
      mermaid.run();
    });
  </script>
</body>
</html>
