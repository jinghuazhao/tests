<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    body {
      max-width: 900px;
      margin: 40px auto;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      padding: 0 20px;
    }
    code {
      background: #f4f4f4;
      padding: 2px 4px;
      border-radius: 4px;
    }
    pre {
      background: #f6f8fa;
      padding: 12px;
      overflow-x: auto;
    }
    a {
      color: #0366d6;
    }
    .mermaid {
      text-align: center;
    }
  </style>
</head>
<body>
<!-- Jekyll injects Markdown-rendered HTML here -->
{{ content }}
<!-- Mermaid (stable Jekyll-safe setup) -->
<script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
document.addEventListener("DOMContentLoaded", async () => {
  mermaid.initialize({
    startOnLoad: false,
    theme: "default"
  });
  await mermaid.run({
    querySelector: ".mermaid"
  });
});
</script>
</body>
</html>
